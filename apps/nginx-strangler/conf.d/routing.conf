# =============================================================================
# nginx-strangler — Configuration de routage "as-code"
#
# Ce fichier est le cœur du pattern Strangler Fig.
# Il route progressivement les routes de server (legacy) vers server-nestjs.
#
# Variables d'environnement substituées au démarrage (via envsubst) :
#   LEGACY_UPSTREAM  — adresse du backend Fastify legacy  (ex: server:8080)
#   NESTJS_UPSTREAM  — adresse du backend NestJS          (ex: server-nestjs:3001)
#
# Format d'une bascule :
#   # [Vague X - module] AAAA-MM-JJ
#   location [= | ^~ | ~] /api/v1/xxx {
#       proxy_pass http://server-nestjs;
#       include /etc/nginx/conf.d/_proxy_headers.conf;
#   }
#
# Procédure de rollback d'une route :
#   1. Commenter le bloc location concerné (ajouter "# ROLLBACK AAAA-MM-JJ")
#   2. docker compose exec nginx-strangler nginx -s reload
# =============================================================================

upstream server-legacy {
    server ${LEGACY_UPSTREAM};
}

upstream server-nestjs {
    server ${NESTJS_UPSTREAM};
}

server {
    listen 8080;

    # ── Routes migrées vers NestJS ────────────────────────────────────────────
    # (vide au démarrage — toutes les routes sont en fallback sur server-legacy)
    #
    # Exemple (à décommenter lors de la Vague 1) :
    #
    # # [Vague 1 - system/health] 2026-XX-XX
    # location = /api/v1/system/health {
    #     proxy_pass http://server-nestjs;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # Healthcheck de nginx-strangler lui-même
    location = /health {
      access_log off;
      add_header 'Content-Type' 'application/json';
      return 200 '{"status":"UP"}';
    }

    #################################################
    # BASCULE DES ROUTES LEGACY->NESTJS
    #
    # [Vague 1 - service-chains/opencds] 2026-04-09
    location /api/v1/service-chains {
        proxy_pass         http://server-nestjs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Fallback : tout le reste vers le server legacy ────────────────────────
    location /api/ {
        proxy_pass         http://server-legacy;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_buffering    off;
        proxy_redirect     off;
    }

    location /swagger-ui {
        proxy_pass         http://server-legacy;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
