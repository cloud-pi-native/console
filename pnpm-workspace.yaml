packages:
  - packages/**
  - plugins/**
  - apps/**
  - "!apps/server/src/plugins/external/**"
  - playwright/**
allowBuilds:
  "@nestjs/core": true
  "@prisma/client": true
  "@prisma/engines": true
  "@scarf/scarf": true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  vue-demi: true
allowUnusedPatches: true
autoInstallPeers: true
injectWorkspacePackages: true
# minimum number of minutes that must pass after a version is published before
# pnpm will install it. This applies to all dependencies, including transitive ones.
minimumReleaseAge: 1440 # 1 day
catalogMode: strict
cleanupUnusedCatalogs: true
shellEmulator: true
trustPolicy: no-downgrade
# Check these after each update. This list should be empty !
trustPolicyExclude:
  - rollup@2.80.0
  - semver@6.3.1
  - chokidar@4.0.3
  - pino@9.14.0
  - typescript-transform-paths@3.5.6
  - undici-types@6.21.0
